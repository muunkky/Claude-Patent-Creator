---
name: patent-workflow-end-to-end
description: Complete patent creation workflow validation

test_case:
  name: simple-software-invention
  input:
    invention: "System for optimizing database queries using machine learning"
    problem: "Existing query optimizers are rule-based and inflexible"
    solution: "Learn query patterns from execution history to predict optimal plans"
    components:
      - "Query analyzer"
      - "ML model (neural network)"
      - "Execution history database"
      - "Query plan selector"

phases:
  - phase: 1
    name: "Discovery"
    expected_outputs:
      - "Invention categorized as software/computer-implemented"
      - "Prior art awareness documented"
      - "Key innovations identified"

  - phase: 2
    name: "Technology Analysis"
    expected_outputs:
      - "35 USC 101 eligibility assessment"
      - "Alice framework compliance strategy"
      - "Novelty differentiators identified"

  - phase: 3
    name: "Specification Drafting"
    expected_outputs:
      - "Background section (prior art limitations)"
      - "Summary of invention"
      - "Detailed description with [0001]-[NNNN] paragraphs"
      - "Word count: >3000 words"

  - phase: 4
    name: "Claims Drafting"
    expected_outputs:
      - "At least 1 independent system claim"
      - "At least 1 independent method claim"
      - "At least 5 dependent claims"
      - "Proper antecedent basis"

  - phase: 5
    name: "Diagrams & Abstract"
    expected_outputs:
      - "System block diagram (SVG)"
      - "Method flowchart (SVG)"
      - "Abstract ≤150 words"

  - phase: 6
    name: "Automatic Validation"
    expected_outputs:
      - "/full-review executed"
      - "Compliance report generated"
      - "Critical issues: 0"

success_criteria:
  - all_phases_complete: true
  - total_time: "<90 minutes"
  - filing_readiness: "≥90%"
  - claims_count: "≥7"
  - diagrams_count: "≥2"
  - abstract_compliance: true
