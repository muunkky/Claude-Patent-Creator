---
name: mpep-search-quality
description: Verify MPEP search returns relevant USPTO guidance

test_cases:
  - name: claim-definiteness-search
    input:
      query: "claim definiteness 112(b)"
      expected_sections:
        - "2173"  # Claim definiteness
        - "2173.05"  # Relationship between 112(b) and enablement
    validation:
      - top_k: 5
      - expect: "MPEP section 2173 in top 3 results"
      - expect: "Contains 35 USC 112(b) references"

  - name: enablement-search
    input:
      query: "enablement requirement patent"
      expected_sections:
        - "2164"  # Enablement requirement
        - "2164.01"  # Test for enablement
    validation:
      - top_k: 5
      - expect: "MPEP 2164 in top 3 results"
      - expect: "Contains WANDS factors"

  - name: abstract-requirements
    input:
      query: "abstract word limit requirements"
      expected_sections:
        - "608.01(b)"  # Abstract of the disclosure
    validation:
      - top_k: 5
      - expect: "150-word limit mentioned"
      - expect: "MPEP 608.01(b) cited"

success_criteria:
  - relevance_score: ">0.7"
  - top_section_accuracy: "100%"
  - response_time: "<1 second"
