---
name: claims-analysis-accuracy
description: Test claims analyzer detects common USPTO compliance issues

test_cases:
  - name: missing-antecedent-basis
    input:
      claims: |
        1. A system comprising:
           a processor; and
           the memory coupled to the processor.
    expected_issues:
      - type: "antecedent_basis"
        element: "the memory"
        severity: "critical"
        mpep: "2173.05(e)"
    validation:
      - expect: "Detects missing antecedent for 'the memory'"
      - expect: "Suggests introducing 'a memory' first"

  - name: indefinite-term
    input:
      claims: |
        1. A method comprising:
           processing data in a substantially parallel manner.
    expected_issues:
      - type: "definiteness"
        term: "substantially parallel"
        severity: "important"
        mpep: "2173.05(b)"
    validation:
      - expect: "Flags 'substantially' as subjective"
      - expect: "Recommends objective criteria"

  - name: improper-dependency
    input:
      claims: |
        1. A system comprising a processor.
        2. The system of claim 1, wherein the processor includes a cache.
        3. The system of claim 2 or claim 5, further comprising memory.
    expected_issues:
      - type: "claim_dependency"
        claim: "3"
        issue: "depends on non-existent claim 5"
        severity: "critical"
    validation:
      - expect: "Detects forward reference to claim 5"
      - expect: "Marks as critical issue"

success_criteria:
  - detection_rate: "100%"
  - false_positives: "<10%"
  - mpep_citation_accuracy: "100%"
